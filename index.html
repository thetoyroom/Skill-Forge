<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKILL FORGE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --fg: #ffffff;
      --accent: #ff6b00;
    }
    
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
    }
    
    .font-mono {
      font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    
    .brutalist {
      border: 1px solid #ffffff;
    }
    
    .brutalist-thick {
      border: 2px solid #ffffff;
    }
    
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #ff6b00;
      font-weight: 700;
    }
    
    .nav-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    
    .hero-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 0.9;
    }
    
    .book-title {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 0.95;
    }
    
    .archive-card {
      background: #0a0a0a;
      border: 1px solid #ffffff;
      transition: all 0.1s ease;
      display: flex;
      flex-direction: column;
    }
    
    .archive-card:hover {
      border-color: #ff6b00;
      background: #111111;
    }
    
    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 12px;
      padding: 10px 20px;
      border: 1px solid #ffffff;
      background: #ffffff;
      color: #0a0a0a;
      transition: all 0.1s ease;
      cursor: pointer;
    }
    
    .btn:hover {
      background: #ff6b00;
      border-color: #ff6b00;
      color: #0a0a0a;
    }
    
    .btn-outline {
      background: transparent;
      color: #ffffff;
      border: 1px solid #ffffff;
    }
    
    .btn-outline:hover {
      background: #ff6b00;
      border-color: #ff6b00;
      color: #0a0a0a;
    }
    
    .btn-small {
      font-size: 10px;
      padding: 6px 12px;
    }
    
    .tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 16px;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    
    .tab.active {
      border-bottom-color: #ff6b00;
      color: #ff6b00;
      font-weight: 700;
    }
    
    .code-block {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      line-height: 1.5;
      background: #111111;
      border: 1px solid #333333;
      white-space: pre-wrap;
      word-break: break-word;
    }
    
    .bracket {
      color: #ff6b00;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }
    
    .barcode {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 4px;
      font-size: 13px;
    }
    
    .status-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 2px 8px;
      border: 1px solid #ffffff;
    }
    
    .meta-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: #ff6b00;
      font-weight: 700;
    }
    
    .search-input {
      background: #111111;
      border: 1px solid #ffffff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      padding: 14px 18px;
      color: #ffffff;
    }
    
    .search-input:focus {
      outline: none;
      border-color: #ff6b00;
    }
    
    .chip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 4px 10px;
      border: 1px solid #ffffff;
      background: transparent;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    
    .chip:hover {
      background: #ff6b00;
      border-color: #ff6b00;
      color: #0a0a0a;
    }
    
    .dither {
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 3px 3px;
    }
    
    .rule {
      border-top: 1px solid #ffffff;
    }
    
    .heavy-rule {
      border-top: 2px solid #ffffff;
    }
    
    .archival {
      font-size: 10px;
      letter-spacing: 2px;
    }
    
    .loading-barcode {
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 8px;
      animation: barcode 800ms steps(8) infinite;
    }
    
    @keyframes barcode {
      0% { content: '|||||    '; }
      12.5% { content: ' |||||   '; }
      25% { content: '  |||||  '; }
      37.5% { content: '   ||||| '; }
      50% { content: '    |||||'; }
      62.5% { content: '|    ||||'; }
      75% { content: '||    |||'; }
      87.5% { content: '|||    ||'; }
      100% { content: '||||    |'; }
    }
    
    .skill-md-content {
      font-size: 13px;
      line-height: 1.6;
    }
    
    .pull {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      border-left: 3px solid #ff6b00;
      padding-left: 14px;
    }
    
    .empty-state {
      border: 2px solid #ffffff;
      background: #111111;
    }
    
    .result-card {
      min-height: 280px;
    }
  </style>
</head>
<body class="bg-[#0a0a0a] text-white min-h-screen">
  <div id="app"></div>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    function initTailwind() {}

    // STATE
    let state = {
      view: 'search',
      query: '',
      results: [],
      isSearching: false,
      selectedBook: null,
      activeTab: 'skill',
      isGenerating: false,
      generationStatus: '',
      skillMd: '',
      summary: null,
      similar: [],
      error: null,
      apiKey: localStorage.getItem('skillforge_groq_key') || '',
      showKeyPanel: false,
      uploadText: '',
      uploadTitle: '',
      uploadAuthor: '',
      isUploading: false,
      featured: [],
      bookSources: [],
      isSearchingBook: false,
      bookSearchDone: false
    };

    // RENDER ROOT
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = '';

      const root = document.createElement('div');
      root.className = 'min-h-screen bg-[#0a0a0a] text-white';

      // NAV - STICKY HEADER (fixed)
      const nav = document.createElement('div');
      nav.className = 'border-b border-white/70 px-5 py-4 flex items-center justify-between sticky top-0 z-50 bg-[#0a0a0a]';
      nav.innerHTML = `
        <div class="flex items-center gap-3">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 border-2 border-white flex items-center justify-center">
              <div class="barcode text-[11px] leading-none text-white">||||</div>
            </div>
            <div class="font-mono text-xl font-black tracking-[-1.5px]">SKILL FORGE</div>
          </div>
          <div onclick="browseLibrary()" class="ml-4 text-xs nav-label px-3 py-1 border border-white cursor-pointer hover:bg-white hover:text-black"> [01] BROWSE LIBRARY </div>
        </div>
        <div class="flex items-center gap-4 text-xs">
          <div class="font-mono text-[10px] text-white/30 tracking-wider hidden sm:block">⚡ GROQ ENGINE</div>
          <div onclick="showKeyPanel()" class="px-4 py-1.5 border ${state.apiKey ? 'border-[#ff6b00] text-[#ff6b00]' : 'border-white'} cursor-pointer hover:bg-[#ff6b00] hover:border-[#ff6b00] hover:text-black font-mono tracking-wider transition-all">${state.apiKey ? '⚡ KEY SET' : 'SET GROQ KEY'}</div>
          <div class="font-mono text-white/60 tracking-[1px]">REF. 788175</div>
        </div>
      `;
      root.appendChild(nav);

      if (state.view === 'search' || state.view === 'results') {
        root.appendChild(renderSearchView());
      } else if (state.view === 'detail') {
        root.appendChild(renderDetailView());
      }

      if (state.error) {
        const err = document.createElement('div');
        err.className = 'fixed bottom-4 right-4 max-w-sm border-2 border-white bg-[#111] px-4 py-3 font-mono text-sm z-50';
        err.innerHTML = `
          <div class="flex justify-between items-start gap-4">
            <div><span class="text-[#ff6b00]">[ERROR]</span> ${state.error}</div>
            <div onclick="clearError()" class="cursor-pointer text-white/60 hover:text-white">×</div>
          </div>
        `;
        root.appendChild(err);
      }

      // Privacy footer (protocol line removed as requested)
      const foot = document.createElement('div');
      foot.className = 'border-t border-white/70 mt-12 py-4 px-5 text-[10px] font-mono text-white/50 tracking-widest flex items-center justify-between';
      foot.innerHTML = `
        <div>NOTHING IS STORED. EVERYTHING RUNS IN YOUR BROWSER. LEGAL COPIES ONLY.</div>
      `;
      root.appendChild(foot);

      app.appendChild(root);

      attachDynamicListeners();
    }

    function attachDynamicListeners() {
      // Search input Enter key
      const searchInput = document.getElementById('search-input');
      if (searchInput) {
        searchInput.onkeydown = null;
        searchInput.onkeydown = function(e) {
          if (e.key === 'Enter') {
            performSearch();
          }
        };
      }

      // Results grid delegation
      const resultsContainer = document.getElementById('results-container');
      if (resultsContainer) {
        resultsContainer.addEventListener('click', function(e) {
          const card = e.target.closest('[data-book-index]');
          if (card) {
            const idx = parseInt(card.getAttribute('data-book-index'), 10);
            if (!isNaN(idx) && state.results[idx]) {
              selectBook(state.results[idx]);
            }
          }
        });
      }

      // Similar delegation in detail
      const detailSimilar = document.querySelector('[data-similar-container]');
      if (detailSimilar) {
        detailSimilar.addEventListener('click', function(e) {
          const card = e.target.closest('[data-similar-index]');
          if (card) {
            const idx = parseInt(card.getAttribute('data-similar-index'), 10);
            if (!isNaN(idx) && state.similar[idx]) {
              forgeSimilar(state.similar[idx]);
            }
          }
        });
      }
    }

    // SEARCH VIEW
    function renderSearchView() {
      const wrap = document.createElement('div');
      wrap.className = 'max-w-[1100px] mx-auto px-5';

      // HERO
      const hero = document.createElement('div');
      hero.className = 'pt-12 pb-9';
      hero.innerHTML = `
        <div class="max-w-[820px]">
          <div class="section-label mb-2">[FIG. 1A] AI AGENT INFRASTRUCTURE</div>
          <div class="hero-title text-[92px] leading-[0.86] tracking-[-6.5px] font-black">SKILL<br>FORGE</div>
          <div class="mt-4 text-[21px] leading-tight max-w-[620px]">
            Convert the hard-won wisdom of any book into a production-ready 
            <span class="text-[#ff6b00]">SKILL.md</span> that teaches AI agents how to think, decide, and operate like the author.
          </div>
        </div>
      `;

      // SEARCH BAR
      const searchBar = document.createElement('div');
      searchBar.className = 'mt-6 flex gap-2 max-w-[780px]';
      searchBar.innerHTML = `
        <input id="search-input" 
               class="search-input flex-1 brutalist-thick text-lg placeholder:text-white/40" 
               placeholder="Search books by title or author..." 
               value="${state.query.replace(/"/g, '&quot;')}">
        <button onclick="performSearch()" class="btn">SEARCH →</button>
      `;

      // EXAMPLE CHIPS - FIXED: set value + search, cleaned classes (no mt-3 flex gap-2)
      const chips = document.createElement('div');
      chips.className = 'mt-4 flex flex-wrap';
      const examples = ['Atomic Habits', 'Design Patterns', 'The Psychology of Money', 'Deep Work', 'Thinking, Fast and Slow'];
      chips.innerHTML = `<span class="text-xs text-white/50 self-center mr-1 font-mono">TRY:</span>`;
      examples.forEach(ex => {
        const b = document.createElement('div');
        b.className = 'chip';
        b.textContent = ex;
        // FIXED: set input value visibly + trigger search
        b.onclick = () => {
          state.query = ex;
          const inp = document.getElementById('search-input');
          if (inp) inp.value = ex;
          performSearch();
        };
        chips.appendChild(b);
      });

      // PROCESS
      const process = document.createElement('div');
      process.className = 'mt-12 grid grid-cols-1 md:grid-cols-4 gap-3 border-t border-white pt-6';
      const steps = [
        { num: '01', label: 'SEARCH', desc: 'Find any book via Open Library\'s free catalog of human knowledge.' },
        { num: '02', label: 'SELECT', desc: 'Pick the philosophy or mindset you want to capture as an agent skill.' },
        { num: '03', label: 'FORGE', desc: 'Groq (Llama 3.3 70B) reverse-engineers it into principles, guardrails, decision logic and deep frameworks — in seconds.' },
        { num: '04', label: 'DEPLOY', desc: 'Copy or download the SKILL.md. Install in Claude, Cursor, or any AI agent.' }
      ];
      steps.forEach((s) => {
        const card = document.createElement('div');
        card.className = 'border border-white/70 p-4';
        card.innerHTML = `
          <div class="font-mono text-xs text-[#ff6b00] mb-1">STEP ${s.num}</div>
          <div class="font-mono font-bold tracking-wider mb-1.5">${s.label}</div>
          <div class="text-sm text-white/70 leading-snug">${s.desc}</div>
        `;
        process.appendChild(card);
      });

      // RESULTS SECTION with loading support
      let resultsHtml = '';
      if (state.view === 'results' && state.isSearching) {
        resultsHtml = renderSearchLoadingString();
      } else if (state.view === 'results' && state.results.length > 0) {
        resultsHtml = renderResultsGridString();
      } else if (state.view === 'results' && state.results.length === 0) {
        resultsHtml = renderNoResultsString();
      }

      // UPLOAD TEASER
      const uploadTeaser = document.createElement('div');
      uploadTeaser.className = 'mt-10 border border-dashed border-white/60 p-5 text-sm flex flex-col md:flex-row gap-4 items-start';
      uploadTeaser.innerHTML = `
        <div class="font-mono text-[#ff6b00] text-xs tracking-widest">UPLOAD YOUR LEGAL COPY</div>
        <div class="flex-1 text-white/80">Have a PDF, EPUB or text file of a book you own? Paste or upload it to generate a SKILL.md directly from the source material. <span class="text-white/50">(Nothing is uploaded to any server.)</span></div>
        <button onclick="showUploadPanel()" class="btn btn-small">UPLOAD / PASTE</button>
      `;

      wrap.appendChild(hero);
      wrap.appendChild(searchBar);
      wrap.appendChild(chips);
      wrap.appendChild(process);

      if (resultsHtml) {
        const resWrap = document.createElement('div');
        resWrap.innerHTML = resultsHtml;
        wrap.appendChild(resWrap);
      }
      wrap.appendChild(uploadTeaser);

      return wrap;
    }

    // NEW: Search loading indicator (brutalist)
    function renderSearchLoadingString() {
      return `
        <div class="mt-10 border border-white/70 p-8 text-center">
          <div class="loading-barcode text-3xl text-[#ff6b00] mb-3">||||||||</div>
          <div class="font-mono text-sm tracking-[3px] text-[#ff6b00]">SEARCHING ARCHIVE...</div>
          <div class="text-xs text-white/50 mt-2">Querying Open Library catalog</div>
        </div>
      `;
    }

    // RESULTS GRID - IMPROVED layout (portrait covers, consistent height, better gap/typography)
    function renderResultsGridString() {
      let html = `
        <div class="mt-10" id="results-container">
          <div class="flex items-center justify-between mb-4">
            <div class="font-mono text-xs text-[#ff6b00]">[ARCHIVE RESULTS] — ${state.results.length} ENTRIES</div>
            <div onclick="clearSearch()" class="text-xs font-mono cursor-pointer hover:text-[#ff6b00]">CLEAR</div>
          </div>
          <div id="results-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-5">
      `;
      state.results.forEach((book, idx) => {
        html += renderResultCardString(book, idx);
      });
      html += `</div></div>`;
      return html;
    }

    // IMPROVED result card: portrait aspect, flex layout, better truncation, hover on forge text, consistent height
    function renderResultCardString(book, idx) {
      const cover = book.coverId 
        ? `https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg`
        : null;

      const ratingDots = book.rating 
        ? '●'.repeat(Math.round(book.rating / 2)) + '○'.repeat(5 - Math.round(book.rating / 2))
        : '●●●○○';

      const safeTitle = (book.title || 'Untitled').replace(/"/g, '&quot;');
      const safeAuthor = (book.author || 'Unknown').replace(/"/g, '&quot;');

      return `
        <div data-book-index="${idx}" class="archive-card p-3 cursor-pointer group result-card">
          <!-- Portrait cover -->
          <div class="aspect-[2/3] bg-black border border-white/70 mb-3 overflow-hidden relative flex items-center justify-center flex-shrink-0">
            ${cover 
              ? `<img src="${cover}" class="w-full h-full object-cover" onerror="this.style.display='none';this.parentNode.innerHTML='<div class=\\'flex items-center justify-center h-full text-[10px] text-white/30\\'>NO COVER SCAN</div>'">`
              : `<div class="text-center text-white/30 text-xs font-mono">NO COVER<br>ARCHIVE SCAN</div>`}
            <div class="absolute top-1.5 left-1.5 text-[9px] font-mono bg-black/70 px-1.5 py-px border border-white/60">CAT ${Math.floor(Math.random()*900)+100}</div>
          </div>
          
          <!-- Text content with flex for alignment -->
          <div class="flex-1 flex flex-col min-h-0">
            <div class="font-mono text-[14px] leading-[1.15] font-bold group-hover:text-[#ff6b00] transition-colors mb-1" 
                 style="display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">
              ${safeTitle}
            </div>
            
            <div class="text-xs text-white/70 mb-2" style="display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden;">
              ${safeAuthor} // ${book.year || '—'}
            </div>
            
            <div class="mt-auto flex items-center justify-between text-[10px]">
              <div class="text-[#ff6b00]">${ratingDots}</div>
              <div class="text-[#ff6b00] group-hover:font-bold group-hover:underline transition-all">FORGE SKILL →</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderNoResultsString() {
      return `
        <div class="mt-10 empty-state p-8 max-w-2xl">
          <div class="section-label mb-2">[NO MATCHES IN ARCHIVE]</div>
          <div class="text-2xl font-mono font-bold tracking-tight">THE TITLE YOU ENTERED DOES NOT EXIST IN OUR CURRENT INDEX OR RETURNED ZERO RESULTS.</div>
          <div class="mt-4 text-sm text-white/70">Open Library returned no usable entries for your query. This can happen with very obscure titles, typos, or books not yet catalogued.</div>
          
          <div class="mt-6 flex flex-wrap gap-2">
            <button onclick="clearSearchAndFocus()" class="btn btn-small">NEW SEARCH</button>
            <button onclick="useExamples()" class="btn btn-small btn-outline">TRY EXAMPLES</button>
            <button onclick="showUploadPanel()" class="btn btn-small btn-outline">USE UPLOAD INSTEAD</button>
            <button onclick="browseLibrary()" class="btn btn-small btn-outline">BROWSE FEATURED ARCHIVES</button>
          </div>
          <div class="mt-4 text-[10px] text-white/50 font-mono">TIP: Try shorter titles, remove subtitles, or search by author name.</div>
        </div>
      `;
    }

    // DETAIL VIEW (unchanged core logic, kept working)
    function renderDetailView() {
      const wrap = document.createElement('div');
      wrap.className = 'max-w-[1280px] mx-auto px-5 pb-12';

      const b = state.selectedBook || {};
      const coverUrl = b.coverId ? `https://covers.openlibrary.org/b/id/${b.coverId}-L.jpg` : null;

      const header = document.createElement('div');
      header.className = 'flex items-center justify-between pt-6 pb-4 border-b border-white';
      header.innerHTML = `
        <div onclick="backToResults()" class="flex items-center gap-2 text-xs font-mono cursor-pointer hover:text-[#ff6b00]">
          <span>←</span> <span>BACK TO RESULTS</span>
        </div>
        <div class="font-mono text-xs text-white/60">INDEX: SF-REL-${Math.floor(Math.random()*9000)+1000}</div>
      `;

      const split = document.createElement('div');
      split.className = 'grid grid-cols-1 lg:grid-cols-12 gap-6 mt-6';

      const left = document.createElement('div');
      left.className = 'lg:col-span-5 space-y-4';
      const safeTitle = (b.title || 'UNTITLED').replace(/"/g, '&quot;');
      left.innerHTML = `
        <div class="brutalist-thick bg-black p-2">
          <div class="aspect-[4/3] bg-[#111] flex items-center justify-center overflow-hidden border border-white/40">
            ${coverUrl 
              ? `<img src="${coverUrl}" class="max-h-full" onerror="this.outerHTML='<div class=\\'text-center text-white/30 p-8\\'><div class=\\'font-mono text-xs\\'>NO COVER AVAILABLE</div><div class=\\'text-[10px] mt-1\\'>ARCHIVAL SCAN MISSING</div></div>'">`
              : `<div class="text-center p-8"><div class="font-mono text-xs">NO COVER AVAILABLE</div><div class="text-[10px] mt-1 text-white/40">ARCHIVAL SCAN MISSING</div></div>`}
          </div>
        </div>

        <div class="space-y-3 text-sm">
          <div>
            <div class="section-label">[SOURCE IDENTIFIER]</div>
            <div class="font-mono text-lg leading-none mt-1">${safeTitle}</div>
          </div>
          <div class="text-white/80">${(b.author || 'UNKNOWN AUTHOR').replace(/"/g,'&quot;')} // ${b.year || '—'}</div>

          <div class="flex gap-2 flex-wrap">
            <div class="status-pill text-[#ff6b00]">VERIFIED</div>
            <div class="status-pill">HIGH-CONFIDENCE</div>
            <div class="status-pill border-[#ff6b00] text-[#ff6b00]">READY FOR INJECTION</div>
          </div>

          <div class="pt-2 border-t border-white/40">
            <div class="meta-label">[OPEN LIBRARY DATA]</div>
            <div class="grid grid-cols-2 gap-x-6 text-xs mt-1 text-white/70">
              <div>PUBLISHER: ${b.publisher || 'VARIOUS'}</div>
              <div>PAGES: ${b.pages || '—'}</div>

    async function performSearch() {
      const input = document.getElementById('search-input');
      if (!input) return;
      state.query = input.value.trim();
      if (!state.query) return;

      state.isSearching = true;
      state.error = null;
      state.view = 'results';
      render(); // shows loading via the new check

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 12000); // 12 seconds timeout

      try {
        // We use a specific subset of fields to prevent massive payload downloads, but sometimes Open Library is slow.
        const url = `https://openlibrary.org/search.json?q=${encodeURIComponent(state.query)}&limit=18&fields=key,title,author_name,first_publish_year,cover_i,subject,ratings_average`;
        const res = await fetch(url, { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!res.ok) throw new Error('Search failed with status: ' + res.status);

        const data = await res.json();
        state.results = (data.docs || []).map(doc => ({
          key: doc.key,
          title: doc.title || 'Untitled',
          author: (doc.author_name || []).join(', ') || 'Unknown',
          year: doc.first_publish_year || null,
          coverId: doc.cover_i || null,
          subjects: (doc.subject || []).slice(0, 6),
          rating: doc.ratings_average || null,
          publisher: (doc.publisher || [])[0] || null,
          pages: doc.number_of_pages_median || null,
          raw: doc
        }));
      } catch (e) {
        console.error(e);
        clearTimeout(timeoutId);
        if (e.name === 'AbortError') {
          state.error = 'Open Library is taking too long to respond. Please try again.';
        } else {
          state.error = 'Open Library unreachable. Check connection or try again.';
        }
        state.results = [];
      } finally {
        state.isSearching = false;
        render();
      }
    }

    // ─── Groq API Client ──────────────────────────────────────
    async function callGroq(systemPrompt, userContent, key, maxTokens = 2048) {
      if (!key) throw new Error('MISSING_KEY');

      const res = await fetch('/api/groq', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-groq-key': key
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: maxTokens,
          temperature: 0.4,
          messages: [
            { role: 'system', content: systemPrompt },
            { role: 'user', content: userContent }
          ]
        })
      });

      if (!res.ok) {
        const t = await res.text().catch(() => '');
        throw new Error(`API_ERROR_${res.status}: ${t}`);
      }
      const data = await res.json();
      let text = data.choices?.[0]?.message?.content || '';
      text = text.replace(/^```(?:json|markdown)?\s*/i, '').replace(/\s*```\s*$/i, '').trim();
      return text;
    }

    function safeJSON(str, asArray = false) {
      try {
        const cleaned = str.replace(/^[^\[{]*/, '').replace(/[^\]}]*$/, '');
        const parsed = JSON.parse(cleaned);
        return asArray ? (Array.isArray(parsed) ? parsed : []) : parsed;
      } catch (e) {
        return asArray ? [] : { summary: str.slice(0, 280), keyThemes: [], bestFor: '', coreLesson: '' };
      }
    }

          text = (text + '\n\n' + extracted).trim();
        } catch (e) {
          state.error = 'PDF extraction failed (pdf.js issue). Using pasted text only if any.';
        }
      } else if (file) {
        const txt = await file.text();
        text = (text + '\n\n' + txt).trim();
      }

      state.uploadText = text;
      await forgeFromUserText(state.selectedBook, text);
    }

    async function loadPdfJsIfNeeded() {
      if (window.pdfjsLib) return;
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
        s.onload = () => {
          window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          resolve();
        };
        s.onerror = () => reject(new Error('Failed to load pdf.js'));
        document.head.appendChild(s);
      });
    }

    async function extractTextFromPdf(file) {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      const max = Math.min(pdf.numPages, 3);
      for (let i = 1; i <= max; i++) {
        const page = await pdf.getPage(i);
        const content = await page.getTextContent();
        fullText += content.items.map(it => it.str).join(' ') + '\n\n';
      }
      return fullText.slice(0, 14000);
    }

    async function forgeFromUserText(book, sourceText) {
      state.generationStatus = 'FORGING FROM USER-PROVIDED SOURCE...';
      render();

      const key = state.apiKey.trim();
      const truncated = (sourceText || '').slice(0, 12000); // Groq supports 128k context

      if (!key) {
        state.isGenerating = false;
        state.error = 'Groq API Key required. Get one free at console.groq.com';
        render();
        showKeyPanel();
        return;
      }

      try {
        const skillRaw = await callGroq(
          `You are a master at turning user-provided source material into production SKILL.md files. Output ONLY raw markdown starting with YAML frontmatter.`,
          `Source material (user-provided text, first portion):
${truncated}

Title: ${book.title}
Author: ${book.author}

Your goal is NOT to summarize the text.
Your goal is to reverse-engineer the text into a complete operational skill system.
Assume the original text will be destroyed forever after extraction. The skill file must preserve every useful idea, model, framework, diagnostic, process, principle, decision rule, exercise, failure mode, and worldview contained in the source.

Do not create a generic skill template.

Instead, identify and extract:
1. Core worldview of the author.
2. Fundamental assumptions about reality.
3. Key concepts and precise definitions.
4. Mental models and frameworks.
5. Relationships between concepts.
6. Decision-making rules.
7. Diagnostic frameworks.
8. Step-by-step processes.
9. Common mistakes and failure modes.
10. Exceptions and edge cases.
11. Exercises and training methods.
12. Real-world applications.
13. Case studies and lessons.
14. Patterns repeatedly emphasized throughout the text.
15. Predictions the framework makes.
16. How an expert using this framework would think differently from an average person.
17. Situations where the framework works best.
18. Situations where the framework breaks down.
19. Advanced insights hidden inside examples, stories, anecdotes, and side comments.
20. A compressed cheat sheet of the entire system.

For every concept, explain:
* What it is.
* Why it matters.
* How to recognize it.
* How to apply it.
* What happens when ignored.
* How it connects to other concepts.

The final skill file should allow an intelligent agent to:
* Teach the material.
* Apply the material.
* Diagnose problems using the material.
* Critique actions using the material.
* Generate novel solutions consistent with the material.
* Think like the author even in situations not explicitly covered by the text.

Prioritize depth, completeness, interconnectedness, and practical usability over brevity.

Start immediately with YAML frontmatter (name, description, version: "1.0", license: "MIT"). Ensure you use standard Markdown formatting with appropriate headings. Write with the voice and authority of the author. Be prescriptive and concrete. No generic advice.`,
          key,
          4096
        );
        state.skillMd = skillRaw;
        state.summary = {
          summary: "Generated directly from user-provided legal copy. The material emphasizes disciplined thinking, high standards, and repeatable mental models.",
          keyThemes: ["Discipline", "Mental Models", "High Standards", "Long-Term Thinking"],
          bestFor: "Serious practitioners working with this specific body of knowledge.",
          coreLesson: "Quality of thinking and standards compounds faster than almost any other variable."
        };
        state.similar = [
          {title: "Principles", author: "Ray Dalio", year: 2017, reason: "Similar emphasis on turning lessons into explicit rules."},
          {title: "Thinking in Systems", author: "Donella Meadows", year: 2008, reason: "Leverage and feedback thinking for any domain."}
        ];
      } catch (e) {
        state.summary = null;
        state.similar = [];
        state.skillMd = null;
        state.error = 'Generation from upload failed. Please check your API key and connection.';
        showKeyPanel();
      } finally {
        state.isGenerating = false;
        render();
      }
    }

    // KEY + COPY + INSTALL
    function showKeyPanel() {
      // Remove any existing panel first
      document.querySelectorAll('.key-panel-float').forEach(e => e.remove());
      const panel = document.createElement('div');
      panel.className = 'fixed right-4 top-4 z-[200] bg-[#111] border-2 border-white p-5 w-80 key-panel-float';
      panel.innerHTML = `
        <div class="font-mono text-xs text-[#ff6b00] mb-1">⚡ GROQ API KEY</div>
        <div class="text-[10px] text-white/40 mb-3 font-mono">Free at <a href="https://console.groq.com" target="_blank" class="text-[#ff6b00] underline">console.groq.com</a> — 30 req/min on free tier</div>
        <input id="key-input" type="password" class="w-full bg-black border border-white p-2 text-sm font-mono" value="${state.apiKey}" placeholder="gsk_...">
        <div class="flex gap-2 mt-3">
          <button onclick="saveKey(this)" class="btn flex-1">SAVE KEY</button>
          <button onclick="clearKey(this)" class="btn btn-outline flex-1">CLEAR</button>
        </div>
        <div class="text-[10px] text-white/50 mt-2">Stored only in your browser localStorage.</div>
        <div onclick="this.closest('.key-panel-float').remove()" class="text-right text-xs mt-3 cursor-pointer text-white/50 hover:text-white">CLOSE ×</div>
      `;
      document.body.appendChild(panel);
    }

    function saveKey(el) {
      const inp = document.getElementById('key-input');
      if (!inp) return;
      state.apiKey = inp.value.trim();
      localStorage.setItem('skillforge_groq_key', state.apiKey);
      el.closest('.key-panel-float').remove();
      render();
    }

    function clearKey(el) {
      state.apiKey = '';
      localStorage.removeItem('skillforge_groq_key');
      el.closest('.key-panel-float').remove();
      render();
    }

    function copySkillMd() {
      if (!state.skillMd) return;
      navigator.clipboard.writeText(state.skillMd).then(() => {
        const orig = event?.target?.innerText || '';
        if (event?.target) event.target.innerText = 'COPIED';
        setTimeout(() => {
          if (event?.target) event.target.innerText = orig || 'COPY';
        }, 1400);
      }).catch(() => alert('Copy failed — select the text manually.'));
    }

    function downloadSkillMd() {
      if (!state.skillMd || !state.selectedBook) return;
      const name = (state.selectedBook.title || 'skill').toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 50) + '-skill.md';
      const blob = new Blob([state.skillMd], {type: 'text/markdown'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function downloadBook() {
      if (!state.selectedBook) return;
      const title = state.selectedBook.title || 'book';
      const name = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 50) + '-book.txt';
      
      let content = '';
      if (state.uploadText) {
        content = state.uploadText;
      } else {
        content = `TITLE: ${state.selectedBook.title}\nAUTHOR: ${state.selectedBook.author || 'Unknown'}\n`;
        if (state.summary) {
           content += `\nSUMMARY:\n${state.summary.summary}\n`;
           content += `\nKEY THEMES:\n${(state.summary.keyThemes || []).join(', ')}\n`;
           content += `\nBEST FOR:\n${state.summary.bestFor || 'N/A'}\n`;
           content += `\nCORE LESSON:\n${state.summary.coreLesson || 'N/A'}\n`;
        }
        if (state.selectedBook.key) {
           content += `\nOPEN LIBRARY LINK:\nhttps://openlibrary.org${state.selectedBook.key}\n`;
        }
      }

      const blob = new Blob([content], {type: 'text/plain'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function copyInstallCommand(target) {
      let txt = '';
      const title = state.selectedBook ? state.selectedBook.title : 'Skill';
      if (target === 'claude') {
        txt = `Add as a skill in Claude (copy the block below):\n\n${state.skillMd}\n\n---\nSource: ${title}`;
      } else if (target === 'cursor') {
        txt = `Paste into Cursor custom rules or .cursorrules:\n\n${state.skillMd}`;
      } else {
        txt = state.skillMd;
      }
      navigator.clipboard.writeText(txt).then(() => {
        alert('Install block copied to clipboard.');
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = txt;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        alert('Copied via fallback.');
      });
    }

    function forgeSimilar(sim) {
      const fake = {
        title: sim.title,
        author: sim.author,
        year: sim.year,
        coverId: null,
        subjects: []
      };
      state.selectedBook = fake;
      state.view = 'detail';
      state.activeTab = 'skill';
      render();
      forgeSkill(fake);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, function(m) {
        return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m];
      });
    }

    function clearError() {
      state.error = null;
      render();
    }

    // BOOT
    function boot() {
      initTailwind();
      state.featured = getFeaturedBooks();
      render();

      document.addEventListener('keydown', function(e) {
        if (e.key === '/' && (state.view === 'search' || state.view === 'results')) {
          const active = document.activeElement;
          if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
          e.preventDefault();
          const inp = document.getElementById('search-input');
          if (inp) inp.focus();
        }
      });
    }

    window.onload = boot;

    window.SKILL_FORGE = { state, render };
  </script>
</body>
</html>
